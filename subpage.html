<head>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <style>
        .subpage-hero {
            padding-top: 150px;
            padding-bottom: 50px;
            text-align: center;
            animation: zoom 0.8s;
        }
        .subpage-description {
            max-width: 800px;
            margin: 0 auto 50px auto;
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: center;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .gallery-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 15px;
            text-align: center;
            transition: var(--transition);
        }
        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }
        .gallery-item img {
            width: 100%;
            height: 350px;
            object-fit: contain;
            background: rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }
        .gallery-desc {
            font-size: 0.9rem;
            color: var(--primary-color);
            font-style: italic;
            font-family: 'Playfair Display', serif;
        }

        /* Timeline Styles for Ambientação */
        .timeline-container {
            position: relative;
            max-width: 1000px;
            margin: 60px auto;
            padding: 20px 0;
        }

        .timeline-container::after {
            content: '';
            position: absolute;
            width: 2px;
            background-color: var(--primary-color, #d4a373);
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -1px;
        }

        /* Scroll down indicator icon at the bottom of the timeline */
        .timeline-container::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            margin-left: -8px; /* half of width */
            width: 16px;
            height: 16px;
            border-bottom: 3px solid var(--primary-color, #d4a373);
            border-right: 3px solid var(--primary-color, #d4a373);
            transform: rotate(45deg);
            z-index: 2;
            animation: bounceArrow 2s infinite ease-in-out;
        }

        @keyframes bounceArrow {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(45deg); }
            40% { transform: translateY(-10px) rotate(45deg); }
            60% { transform: translateY(-5px) rotate(45deg); }
        }

        .timeline-item {
            padding: 10px 50px;
            position: relative;
            background-color: inherit;
            width: 50%;
            box-sizing: border-box;
        }

        .timeline-item.left {
            left: 0;
        }

        .timeline-item.right {
            left: 50%;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            right: -16px;
            background-color: #1a1a1a; /* Assuming dark theme background */
            border: 2px solid var(--primary-color, #d4a373);
            top: 50%;
            transform: translateY(-50%);
            border-radius: 50%;
            z-index: 1;
        }

        .timeline-item.right::after {
            left: -16px;
        }

        /* Animated downward arrow inside each circle */
        .timeline-item::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            right: -4px; 
            top: 50%;
            margin-top: -4px;
            border-bottom: 2px solid var(--primary-color, #d4a373);
            border-right: 2px solid var(--primary-color, #d4a373);
            z-index: 2;
            animation: bounceArrowInside 1.5s infinite ease-in-out;
        }

        .timeline-item.right::before {
            left: -4px;
        }

        @keyframes bounceArrowInside {
            0% { transform: translateY(-8px) rotate(45deg); opacity: 0; }
            40% { transform: translateY(0px) rotate(45deg); opacity: 1; }
            80% { transform: translateY(8px) rotate(45deg); opacity: 0; }
            100% { transform: translateY(8px) rotate(45deg); opacity: 0; }
        }

        .timeline-content {
            padding: 20px;
            background: var(--glass-bg, rgba(255,255,255,0.05));
            border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            position: relative;
            border-radius: 8px;
            transition: transform 0.3s ease;
            text-align: left;
        }

        .timeline-content:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .timeline-content img {
            width: 100%;
            height: 250px;
            object-fit: contain; /* Like gallery-item img */
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            cursor: zoom-in;
            margin-bottom: 15px;
        }

        .timeline-desc {
            font-size: 0.95rem;
            color: var(--text-color, #e0e0e0);
            line-height: 1.6;
        }

        @media screen and (max-width: 768px) {
            .timeline-container::after {
                left: 31px;
            }
            .timeline-container::before {
                left: 31px;
                margin-left: -7px;
            }
            .timeline-item {
                width: 100%;
                padding-left: 70px;
                padding-right: 25px;
            }
            .timeline-item.right {
                left: 0;
            }
            .timeline-item.left::after, .timeline-item.right::after {
                left: 14px; /* (31-16=15 rounded actually 14 visually better considering 2px border inside box-sizing content-box) let's try 14! */
                right: auto;
            }
            .timeline-item.left::before, .timeline-item.right::before {
                left: 27px; /* 31-4 */
                right: auto;
            }
        }

        /* Gallery Navigation */
        .gallery-nav-container {
            position: relative;
            padding: 0 40px;
            margin: 20px 0;
        }
        
        @media screen and (max-width: 900px) {
            .gallery-nav-container {
                padding: 0 10px;
            }
        }

        .gallery-side-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary-color, #d4a373); /* Highlight color */
            border: none;
            color: #1a1a1a; /* Dark text contrast */
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulseHarmonic 2s infinite alternate;
            box-shadow: 0 0 10px rgba(212, 163, 115, 0.4);
        }

        @keyframes pulseHarmonic {
            0% {
                box-shadow: 0 0 10px rgba(212, 163, 115, 0.3);
                opacity: 0.85;
                transform: translateY(-50%) scale(0.95);
            }
            100% {
                box-shadow: 0 0 25px rgba(212, 163, 115, 0.9);
                opacity: 1;
                transform: translateY(-50%) scale(1.05);
            }
        }

        .gallery-side-btn:hover:not(:disabled) {
            background: #fff;
            color: var(--primary-color, #d4a373);
            animation: none;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            transform: translateY(-50%) scale(1.15);
        }

        .gallery-side-btn:disabled {
            opacity: 0.15;
            cursor: not-allowed;
            background: var(--glass-bg, rgba(255,255,255,0.05));
            color: var(--primary-color, #d4a373);
            border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            animation: none;
            box-shadow: none;
        }

        .gallery-side-btn.prev {
            left: 0;
        }

        .gallery-side-btn.next {
            right: 0;
        }
        
        .gallery-counter {
            text-align: center;
            margin-top: 30px;
            color: var(--text-muted, #999);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Sinuous Timeline (Consultoria Online) */
        .timeline-sinuous-container {
            position: relative;
            max-width: 1000px;
            margin: 80px auto;
            padding: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sinuous-line {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 120px;
            transform: translateY(-50%);
            z-index: 0;
        }

        .timeline-sinuous-item {
            position: relative;
            width: 30%;
            z-index: 1;
        }

        /* Staggered items */
        .timeline-sinuous-item:nth-child(2) { margin-top: -120px; }
        .timeline-sinuous-item:nth-child(3) { margin-top: 120px; }
        .timeline-sinuous-item:nth-child(4) { margin-top: -120px; }

        /* Floating dots animation/hover */
        .sinuous-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #1a1a1a;
            border: 4px solid var(--primary-color, #d4a373);
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* Nth-child logic since SVG is first child */
        .timeline-sinuous-item:nth-child(2) .sinuous-dot { bottom: -70px; }
        .timeline-sinuous-item:nth-child(3) .sinuous-dot { top: -70px; }
        .timeline-sinuous-item:nth-child(4) .sinuous-dot { bottom: -70px; }

        .timeline-sinuous-content {
            background: var(--glass-bg, rgba(255,255,255,0.05));
            border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.3s ease;
            text-align: left;
        }

        .timeline-sinuous-content:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .timeline-sinuous-content img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            cursor: zoom-in;
            margin-bottom: 15px;
        }

        .timeline-sinuous-desc {
            font-size: 0.95rem;
            color: var(--text-color, #e0e0e0);
            line-height: 1.6;
        }

        @media screen and (max-width: 768px) {
            .timeline-sinuous-container {
                flex-direction: column;
                gap: 50px;
            }
            .sinuous-line {
                display: none;
            }
            .timeline-sinuous-item {
                width: 100%;
                margin-top: 0 !important;
            }
            .sinuous-dot {
                display: none;
            }
        }
    </style>
</head>
